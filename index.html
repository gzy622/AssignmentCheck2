<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content">
    <title>作业极速登记Pro</title>
    <style>
        :root {
            --primary: #0d6efd;
            --success: #389c6d;
            --danger: #dc3545;
            --bg: #f0f2f5;
            --card: #fff;
            --muted: #6c757d;
            --border: #dee2e6;
            --radius: 12px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body.no-animations * {
            animation: none !important;
            transition: none !important;
        }

        body.no-animations .modal-card {
            opacity: 1 !important;
            transform: none !important;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0 10px 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body.modal-open {
            position: fixed;
            left: 0;
            right: 0;
            width: 100%;
            height: var(--locked-body-height, 100vh);
            overflow: hidden;
        }

        header {
            background: var(--card);
            border-radius: 0 0 16px 16px;
            padding: 6px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            height: 48px;
            position: relative;
            z-index: 10;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .select-wrapper {
            flex: 1;
            min-width: 0;
        }

        select {
            width: 100%;
            padding: 6px;
            font-weight: 600;
            border: 1px solid transparent;
            border-radius: 8px;
            background: #f8f9fa;
            outline: none;
            text-overflow: ellipsis;
        }

        .toolbar {
            display: flex;
            align-items: center;
            margin-left: auto;
            gap: 2px;
        }

        .badge {
            background: rgba(25, 135, 84, 0.1);
            color: var(--success);
            padding: 3px 8px;
            border-radius: 10px;
            font-variant-numeric: tabular-nums;
            font-weight: 800;
            font-size: 0.8rem;
        }

        .btn-icon {
            border: none;
            background: transparent;
            color: var(--muted);
            padding: 6px 6px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .btn-icon:hover {
            background: #f1f3f5;
            color: #212529;
        }

        .btn-icon.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }

        .progress-track {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.4s;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(var(--grid-cols, 5), minmax(0, var(--cell-w, 72px)));
            grid-template-rows: repeat(var(--grid-rows, 10), minmax(0, var(--cell-h, 72px)));
            gap: var(--grid-gap, 8px);
            justify-content: stretch;
            align-content: stretch;
            overflow: hidden;
            padding: 4px;
            min-height: 0;
        }

        .student-card {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border);
            border-radius: var(--card-radius, 10px);
            background: linear-gradient(160deg, #ffffff, #f8fafc);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            display: grid;
            grid-template-rows: 1fr;
            gap: 2px;
            place-items: center;
            padding: var(--card-pad, 6px);
            position: relative;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            min-width: 0;
            overflow: hidden;
            transition: transform 0.08s ease, background-color 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
            -webkit-tap-highlight-color: rgba(13, 110, 253, 0.15);
        }

        .student-card:active {
            transform: scale(0.94);
        }

        .student-card.pressing {
            transform: scale(0.94);
            box-shadow: 0 2px 8px rgba(13, 110, 253, 0.2);
        }

        .student-card.done.pressing {
            box-shadow: 0 2px 8px rgba(47, 156, 106, 0.35);
        }

        .student-card.done {
            background: linear-gradient(160deg, #2f9c6a, #1f8254);
            border-color: #1a7449;
            box-shadow: 0 3px 10px rgba(47, 156, 106, 0.3);
        }

        .card-id {
            font-size: var(--id-size, 1.4rem);
            font-weight: 800;
            color: #495057;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            pointer-events: none;
            letter-spacing: -0.02em;
            text-align: center;
            width: 100%;
        }

        .card-name {
            display: none;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #5c6670;
            font-size: var(--name-size, 0.75rem);
            font-weight: 600;
            pointer-events: none;
            padding: 0 2px;
        }

        .student-card.done .card-id,
        .student-card.done .card-name {
            color: #fff;
        }

        .student-card.excluded {
            opacity: 0.45;
            filter: grayscale(0.2);
            cursor: not-allowed;
            box-shadow: none;
        }

        .student-card.excluded:active {
            transform: none;
        }

        .card-score {
            position: absolute;
            top: 4px;
            right: 4px;
            min-width: 18px;
            text-align: center;
            background: #ffc107;
            color: #111;
            font-size: var(--tag-size, 0.65rem);
            font-weight: 800;
            line-height: 1;
            padding: 3px 5px;
            border-radius: 999px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }

        .card-score[hidden] {
            display: none;
        }

        body.mode-names .card-id {
            position: absolute;
            top: 4px;
            left: 5px;
            font-size: var(--id-corner-size, 0.85rem);
            width: auto;
            text-align: left;
        }

        body.mode-names .card-name {
            display: block;
            position: absolute;
            left: 50%;
            top: 60%;
            transform: translate(-50%, -50%);
            width: calc(100% - 10px);
            font-size: calc(var(--name-size, 0.85rem) * 1.25);
            text-align: center;
        }

        /* Menu & Dialogs */
        .dropdown {
            position: fixed;
            top: 62px;
            right: 10px;
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 6px;
            display: none;
            flex-direction: column;
            min-width: 160px;
            z-index: 100;
        }

        .dropdown.show {
            display: flex;
            animation: fadeIn 0.1s;
        }

        .menu-item {
            text-align: left;
            padding: 10px 14px;
            background: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.1s;
        }

        .menu-item:hover {
            background: #f8f9fa;
        }

        .menu-item.danger {
            color: var(--danger);
        }

        .divider {
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }

        /* Modal System */
        dialog {
            border: none;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: var(--modal-vh, 100dvh);
            max-width: none;
            max-height: none;
            background: transparent;
            display: none;
            align-items: flex-start;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            overflow: hidden auto;
            opacity: 0;
            pointer-events: none;
            padding: var(--modal-top-gap, 16px) 0 var(--modal-bottom-gap, 16px);
            will-change: opacity;
            contain: layout paint;
        }

        dialog.is-open,
        dialog.is-closing {
            display: flex;
            opacity: 1;
            pointer-events: auto;
        }

        dialog.is-open {
            animation: fade-in 0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }

        dialog.is-closing {
            animation: fade-out 0.2s cubic-bezier(0.32, 0.72, 0, 1) forwards;
            pointer-events: none;
        }

        .modal-card {
            background: var(--card);
            border-radius: 0;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            transform: translate3d(0, 10px, 0);
            opacity: 0;
            transition: none;
            overflow: hidden;
            flex-shrink: 0;
            height: calc(var(--modal-vh, 100dvh) - var(--modal-top-gap, 0px) - var(--modal-bottom-gap, 0px));
            max-height: calc(var(--modal-vh, 100dvh) - var(--modal-top-gap, 0px) - var(--modal-bottom-gap, 0px));
            will-change: transform, opacity;
            backface-visibility: hidden;
            contain: layout paint;
        }

        dialog.is-open .modal-card {
            animation: zoom-in 0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }

        dialog.is-closing .modal-card {
            animation: zoom-out 0.2s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }

        /* Keyframes */
        @keyframes fade-in{from{opacity:0}to{opacity:1}}
        @keyframes fade-out{from{opacity:1}to{opacity:0}}
        @keyframes zoom-in{from{opacity:0;transform:translate3d(0,10px,0)}to{opacity:1;transform:translate3d(0,0,0)}}
        @keyframes zoom-out{from{opacity:1;transform:translate3d(0,0,0)}to{opacity:0;transform:translate3d(0,10px,0)}}

        .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:none;justify-content:space-between;align-items:center;background:#fff;flex-shrink:0}
        .modal-title{margin:0;font-size:1.1rem;font-weight:700;color:#212529}
        .modal-close{background:transparent;border:none;font-size:1.5rem;color:var(--muted);cursor:pointer;padding:0;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s}
        .modal-close:hover{background:#f1f3f5;color:#000}

        .modal-body{padding:0;overflow-y:auto;font-size:.95rem;color:#495057;line-height:1.5;flex:1;background:var(--bg);display:flex;flex-direction:column;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;transform:translateZ(0)}
        .modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px;background:#fff;flex-shrink:0}
        dialog.full .modal-body{background:var(--bg);padding:0;display:flex;flex-direction:column}

        .modal-page-section{background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:16px;box-shadow:0 6px 20px rgba(15,23,42,.05);padding:16px;display:flex;flex-direction:column;gap:12px}
        .modal-page-text{color:#495057;line-height:1.6;white-space:pre-wrap}
        .modal-page-actions{display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap;padding-top:4px}

        .score-layout{display:flex;flex-direction:column;gap:16px;contain:layout paint}
        .score-hero{background:linear-gradient(135deg,#fff,#eef5ff 60%,#f8fbff);border:1px solid rgba(13,110,253,.14);border-radius:18px;padding:18px;box-shadow:0 10px 24px rgba(13,110,253,.08);display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
        .score-hero-main{min-width:0;display:flex;flex-direction:column;gap:6px}
        .score-hero-title{font-size:1.2rem;font-weight:800;color:#16212c;line-height:1.2}
        .score-hero-sub{display:flex;gap:8px;flex-wrap:wrap;color:#607080;font-size:.82rem}
        .score-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:999px;background:#fff;border:1px solid rgba(15,23,42,.08);font-weight:700}
        .score-chip.done{background:#edf8f1;color:#257447;border-color:rgba(37,116,71,.12)}
        .score-chip.pending{background:#fff4e5;color:#a15c00;border-color:rgba(161,92,0,.12)}
        .score-index{min-width:70px;text-align:right;font-size:.82rem;color:#607080;font-weight:700}
        .score-section{background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:16px;box-shadow:0 6px 20px rgba(15,23,42,.05);padding:16px;display:flex;flex-direction:column;gap:14px}
        .score-section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
        .score-section-title{font-size:.9rem;font-weight:800;color:#16212c}
        .score-input-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
        .score-input{padding:16px 18px;font-size:2rem;font-weight:800;text-align:center;border-radius:16px;border-width:2px;font-variant-numeric:tabular-nums;background:#fbfdff}
        .score-inline-actions{display:flex;gap:8px;flex-wrap:wrap}

        .score-toolbar,.score-nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
        .score-nav .btn[disabled],.score-toolbar .btn[disabled]{opacity:.45;cursor:default}

        @media (max-width: 680px){.score-hero,.score-input-row,.asg-manage-form,.asg-card-fields{grid-template-columns:1fr}.score-index{text-align:left}}

        textarea.st-editor{width:100%;height:300px;padding:12px;border:1px solid var(--border);border-radius:8px;font-family:monospace;resize:vertical;outline:none;font-size:.9rem}
        textarea.st-editor:focus{border-color:var(--primary)}
        .roster-shell{display:flex;flex-direction:column;gap:14px;min-height:0}
        .roster-toolbar{display:flex;flex-wrap:wrap;gap:8px}
        .roster-toolbar .btn{padding:8px 12px}
        .roster-hint-card{background:linear-gradient(145deg,#fff,#f8f9fa);border:1px solid rgba(0,0,0,.05);border-radius:14px;padding:12px 14px;color:#5c6670;font-size:.84rem;line-height:1.55}
        .roster-summary{display:flex;gap:10px;flex-wrap:wrap}
        .roster-badge{padding:6px 10px;border-radius:999px;background:#eef3f8;color:#324253;font-size:.8rem;font-weight:700}
        .roster-list{display:flex;flex-direction:column;gap:10px;min-height:0}
        .roster-row{display:grid;grid-template-columns:88px minmax(0,1fr) auto auto;gap:10px;align-items:center;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:10px 12px;box-shadow:0 2px 6px rgba(0,0,0,.03)}
        .roster-row input[type="text"]{min-width:0}
        .roster-row .input-ui{margin-bottom:0}
        .roster-check{display:flex;align-items:center;gap:6px;color:#5c6670;font-size:.82rem;white-space:nowrap}
        .roster-check input{margin:0}
        .roster-empty{padding:24px 14px;border:1px dashed rgba(0,0,0,.12);border-radius:14px;text-align:center;color:#7a8795;background:rgba(255,255,255,.55)}
        @media (max-width:640px){.roster-row{grid-template-columns:1fr auto;align-items:start}.roster-row .roster-seat{grid-column:1/2}.roster-row .roster-name{grid-column:1/3}.roster-row .roster-check{grid-column:1/2}.roster-row .roster-del{grid-column:2/3;justify-self:end}}
        .input-ui{width:100%;padding:10px;border:2px solid #f0f2f5;border-radius:8px;margin-bottom:0;outline:none;font-family:inherit}
        .input-ui:focus{border-color:var(--primary)}
        .btn{padding:8px 16px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:.9rem;transition:.1s}
        .btn:active{transform:scale(.96)}
        .btn-p{background:var(--primary);color:#fff}
        .btn-c{background:#f1f3f5;color:var(--muted)}
        .btn-c:hover{background:#e9ecef}
        .btn-d{background:var(--danger);color:#fff}

        .st-nav{background:var(--card);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.05);z-index:2;flex-shrink:0}
        .st-title{font-size:1.1rem;font-weight:700;color:#212529;margin:0}
        .st-close{border:none;background:#f1f3f5;width:30px;height:30px;border-radius:50%;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;font-size:1.2rem;line-height:1}
        .st-close:hover{background:#e9ecef;color:#000}
        .st-scroll-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;transform:translateZ(0)}

        .st-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .st-metric{background:linear-gradient(145deg,#fff,#f8f9fa);padding:14px;border-radius:14px;border:1px solid rgba(0,0,0,.04);text-align:center;box-shadow:0 2px 4px rgba(0,0,0,.02)}
        .st-val{font-size:1.8rem;font-weight:800;color:var(--primary);line-height:1.1;letter-spacing:-1px}
        .st-label{font-size:.75rem;color:var(--muted);margin-top:4px;font-weight:500}
        .st-filters{display:flex;overflow-x:auto;gap:8px;padding:2px 2px 8px 2px;scrollbar-width:none}
        .st-filters::-webkit-scrollbar{display:none}
        .st-chip{padding:6px 14px;background:#fff;border:1px solid var(--border);border-radius:20px;font-size:.85rem;color:var(--muted);white-space:nowrap;cursor:pointer;transition:.2s;font-weight:500}
        .st-chip.active{background:#e7f1ff;border-color:var(--primary);color:var(--primary);font-weight:600;box-shadow:0 2px 4px rgba(13,110,253,.1)}
        .st-card-table{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.03);overflow:hidden;border:1px solid var(--border)}
        .st-row{display:grid;grid-template-columns:35% 1fr 50px;padding:12px 16px;border-bottom:1px solid #f8f9fa;align-items:center;gap:10px}
        .st-head{background:#f8f9fa;font-size:.75rem;color:var(--muted);font-weight:600;padding:8px 16px;letter-spacing:.5px;text-transform:uppercase}
        .st-user{display:flex;flex-direction:column;line-height:1.3;overflow:hidden}
        .st-name{font-weight:600;color:#212529;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .st-id{font-size:.75rem;color:#adb5bd;font-family:monospace}
        .st-visual{display:flex;gap:3px;flex-wrap:wrap}
        .st-dot{width:6px;height:6px;border-radius:2px;background:#eee}
        .st-dot.done{background:var(--success)}
        .st-rate{text-align:right;font-weight:700;font-size:.95rem}

        .asg-row-view{grid-template-columns:minmax(0,1fr) 74px 60px}
        .asg-row-btn{width:100%;border:none;background:#fff;appearance:none;text-align:left}
        .asg-row-btn:focus-visible{outline:2px solid #d0e2ff;outline-offset:-2px}
        .asg-rate{text-align:right;font-weight:700;font-size:.9rem}
        .asg-edit-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:10px 12px;border-bottom:1px solid #f8f9fa;align-items:center}
        .asg-edit-row:last-child{border-bottom:none}
        .asg-edit-name{margin:0}
        .asg-edit-tools{display:flex;gap:6px}
        .btn-xs{padding:6px 10px;font-size:.78rem}

        .asg-manage-hero{background:linear-gradient(135deg,#fdfefe,#eef5ff 55%,#fff7eb);border:1px solid rgba(13,110,253,.12);border-radius:18px;padding:16px;box-shadow:0 10px 24px rgba(13,110,253,.08);display:flex;flex-direction:column;gap:12px}
        .asg-manage-hero-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
        .asg-manage-hero-title{font-size:1rem;font-weight:800;color:#17324d}
        .asg-manage-hero-note{font-size:.78rem;color:#54708c}
        .asg-manage-form{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(110px,.8fr) auto;gap:10px;align-items:center}
        .asg-manage-grid{display:grid;gap:12px}
        .asg-card{background:linear-gradient(180deg,#fff,#fbfcff);border:1px solid rgba(15,23,42,.08);border-radius:18px;padding:14px;box-shadow:0 6px 18px rgba(15,23,42,.05);display:flex;flex-direction:column;gap:12px}
        .asg-card.current{border-color:rgba(13,110,253,.3);box-shadow:0 10px 26px rgba(13,110,253,.12)}
        .asg-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
        .asg-card-meta{display:flex;flex-direction:column;gap:4px;min-width:0}
        .asg-card-title{font-size:.98rem;font-weight:800;color:#17212b;line-height:1.2}
        .asg-card-sub{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:.75rem;color:#758292}

        .asg-current-badge,.asg-subject-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:4px 10px;font-size:.74rem;font-weight:700}
        .asg-current-badge{background:#e7f1ff;color:var(--primary)}
        .asg-subject-badge{background:#edf6ef;color:#2d7a4b}
        .asg-subject-badge.non-english{background:#fff1db;color:#b86800}

        .asg-card-stats{text-align:right;font-size:.82rem;color:#607080;min-width:72px}
        .asg-card-rate{display:block;font-size:1.1rem;font-weight:800;color:#16212c;line-height:1.1}
        .asg-card-fields{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(120px,.9fr);gap:10px}
        .asg-field{display:flex;flex-direction:column;gap:6px;min-width:0}
        .asg-field label{font-size:.73rem;color:#7a8795;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
        .asg-subject-presets{display:flex;gap:8px;flex-wrap:wrap}
        .asg-pill{padding:7px 12px;border-radius:999px;border:1px solid #d8e1ec;background:#fff;color:#5b6775;cursor:pointer;font-size:.82rem;font-weight:700;transition:.15s}
        .asg-pill.active{background:#17324d;color:#fff;border-color:#17324d;box-shadow:0 6px 16px rgba(23,50,77,.18)}
        .asg-card-actions{display:flex;gap:8px;flex-wrap:wrap}
        .asg-hint{font-size:.78rem;color:#7a8795}

        .toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,12px);padding:10px 14px;border-radius:999px;background:rgba(18,23,29,.88);color:#fff;font-size:.86rem;line-height:1;z-index:1200;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;white-space:nowrap;max-width:calc(100vw - 32px);overflow:hidden;text-overflow:ellipsis}
        .toast.show{opacity:1;transform:translate(-50%,0)}


        .debug-panel{position:fixed;left:8px;right:8px;bottom:8px;z-index:1200;background:rgba(17,24,39,.92);color:#d1fae5;border-radius:10px;padding:8px 10px;font-size:12px;line-height:1.35;max-height:38vh;overflow:auto;display:none;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
        .debug-panel.show{display:block}

        @keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>

<body>
    <header>
        <div class="select-wrapper"><select id="asgSelect"></select></div>
        <div class="toolbar">
            <div id="counter" class="badge">0/0</div>
            <button id="btnView" class="btn-icon">姓名</button>
            <div style="position: relative;">
                <button id="btnMenu" class="btn-icon" style="display:flex;padding:6px 4px" title="选项">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <circle cx="12" cy="5" r="2" />
                        <circle cx="12" cy="12" r="2" />
                        <circle cx="12" cy="19" r="2" />
                    </svg>
                </button>
                <div id="menu" class="dropdown">
                    <button class="menu-item" act="toggleScore" id="btnScoreMenu">打分模式: 关</button>
                    <button class="menu-item" act="add">新建任务</button>
                    <button class="menu-item" act="stats">统计数据</button>
                    <button class="menu-item" act="asgManage">作业项目管理</button>
                    <button class="menu-item" act="roster">编辑学生名单</button>
                    <div class="divider"></div>
                    <button class="menu-item" act="toggleAnim" id="btnAnim">显示动画: 开</button>
                    <button class="menu-item" act="toggleDebug" id="btnDebug">调试面板: 关</button>
                    <button class="menu-item" act="exp">导出备份</button>
                    <button class="menu-item" act="imp">导入备份</button>
                    <button class="menu-item danger" act="del">删除任务</button>
                </div>
            </div>
        </div>
        <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </header>
    <main id="grid"></main>
    <input type="file" id="fileIn" hidden accept=".json">

    <!-- Modals -->
    <!-- Unified Modal -->
    <dialog id="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title"></h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer"></div>
        </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="debugPanel" class="debug-panel" aria-live="polite"></div>

    <script>
        const $ = id => document.getElementById(id);
        const LS = { get: (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d)), set: (k, v) => localStorage.setItem(k, JSON.stringify(v)) };
        const KEYS = { DATA: 'tracker_db', LIST: 'tracker_roster', ANIM: 'tracker_anim', DEBUG: 'tracker_debug' };
        const SUBJECT_PRESETS = ['英语', '语文', '数学', '物理', '化学', '其他'];
        const IS_ANDROID_FIREFOX = /Android/i.test(navigator.userAgent) && /Firefox/i.test(navigator.userAgent);

        const Toast = {
            el: null,
            timer: 0,
            init() { this.el = $('toast'); },
            show(msg, ms = 1500) {
                if (!this.el) return;
                this.el.textContent = msg;
                this.el.classList.add('show');
                clearTimeout(this.timer);
                this.timer = setTimeout(() => this.el.classList.remove('show'), ms);
            }
        };

        const Debug = {
            enabled: false,
            el: null,
            lines: [],
            init() {
                this.el = $('debugPanel');
                this.enabled = !!LS.get(KEYS.DEBUG, false);
                this.apply();
            },
            apply() {
                if (!this.el) return;
                this.el.classList.toggle('show', this.enabled);
                $('btnDebug').textContent = `调试面板: ${this.enabled ? '开' : '关'}`;
            },
            toggle() {
                this.enabled = !this.enabled;
                LS.set(KEYS.DEBUG, this.enabled);
                if (!this.enabled) this.lines = [];
                this.apply();
                this.render();
            },
            log(msg) {
                if (!this.enabled || !this.el) return;
                const t = new Date();
                const ts = `${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}.${String(t.getMilliseconds()).padStart(3,'0')}`;
                this.lines.push(`[${ts}] ${msg}`);
                if (this.lines.length > 40) this.lines.shift();
                this.render();
            },
            render() {
                if (!this.el) return;
                this.el.textContent = this.enabled ? this.lines.join('\n') || '调试已开启，等待事件...' : '';
            }
        };

        const BackHandler = {
            EXIT_WINDOW_MS: 1500,
            _sentinelHash: '#__tracker_back_guard__',
            _lastBackAt: 0,
            _lastSignalAt: 0,
            _suppressOnce: false,
            _guardReady: false,
            init() {
                this.armGuards();
                window.addEventListener('popstate', () => this.onBackSignal());
                window.addEventListener('hashchange', () => this.onHashChange());
            },
            armGuards() {
                if (location.hash !== this._sentinelHash) location.hash = this._sentinelHash;
                if (this._guardReady) return;
                history.pushState({ __trackerGuard__: true, t: Date.now() }, '');
                this._guardReady = true;
            },
            onHashChange() {
                if (this._suppressOnce) {
                    this._suppressOnce = false;
                    return;
                }
                if (location.hash === this._sentinelHash) return;
                this.onBackSignal();
            },
            closeOverlayLikeEsc() {
                if (Modal.isOpen) {
                    Modal.close(false);
                    return true;
                }
                const menu = $('menu');
                if (menu.classList.contains('show')) {
                    menu.classList.remove('show');
                    return true;
                }
                return false;
            },
            onBackSignal() {
                const now = Date.now();
                if (now - this._lastSignalAt < 80) return;
                this._lastSignalAt = now;
                if (this._suppressOnce) {
                    this._suppressOnce = false;
                    return;
                }
                if (this.closeOverlayLikeEsc()) {
                    this.rearm();
                    return;
                }
                if (now - this._lastBackAt <= this.EXIT_WINDOW_MS) {
                    this.exitPage();
                    return;
                }
                this._lastBackAt = now;
                Toast.show('再按一次返回退出');
                this.rearm();
            },
            rearm() {
                setTimeout(() => {
                    if (location.hash !== this._sentinelHash) location.hash = this._sentinelHash;
                    history.pushState({ __trackerGuard__: true, t: Date.now() }, '');
                    this._guardReady = true;
                }, 0);
            },
            exitPage() {
                this._suppressOnce = true;
                history.back();
                setTimeout(() => {
                    if (!document.hidden) window.close();
                }, 120);
            }
        };

        const State = {
            list: [], roster: [], data: [], curId: null, mode: 'id', scoring: false, animations: true, debug: false,
            asgMap: new Map(),
            rosterIndexMap: new Map(),
            noEnglishIds: [],
            _persistTimer: 0,
            _metricsToken: 0,
            _statsCache: new Map(),
            _dirtyData: false,
            _dirtyList: false,
            _asgListVersion: 0,
            _rosterVersion: 0,
            init() {
                this.list = LS.get(KEYS.LIST, [
                    '01 蓝慧婷',
                    '02 陈静',
                    '03 李智豪',
                    '04 朱佑豪',
                    '05 张伟芬',
                    '06 许俊熠',
                    '07 李凤君',
                    '08 黄文涛',
                    '09 黄泺绮',
                    '10 利子见',
                    '11 蔡嘉乐',
                    '12 刘静娴',
                    '13 蓝烽',
                    '14 张思琪',
                    '15 卢佳慧',
                    '16 钟佳渝',
                    '17 叶帆',
                    '18 吴梦婷',
                    '19 彭文佳',
                    '20 吴思静',
                    '21 刘嘉莹',
                    '22 温秋茹',
                    '23 李乐',
                    '24 温沁钰',
                    '25 林思婷',
                    '26 巫依霞',
                    '27 刘雅淇',
                    '28 侯润楹',
                    '29 叶塘美',
                    '30 黄宇凡',
                    '31 叶煌',
                    '32 张清雅',
                    '33 杨梓豪',
                    '34 王政铭',
                    '35 陈圆',
                    '36 刘斌',
                    '37 丘雅莹',
                    '38 罗燕',
                    '39 何苑琦',
                    '40 赵玉婷',
                    '41 曾宝茹',
                    '42 张栩瑜',
                    '43 李孝霖',
                    '44 杨欢',
                    '45 彭嘉红',
                    '46 丘瑜诗',
                    '47 李欣',
                    '48 吴嘉钰',
                    '49 刘依婷',
                    '50 曾誉宸'
                ]);
                this.parseRoster();
                this.data = LS.get(KEYS.DATA, []);
                this.data = this.data.map(a => this.normalizeAsg(a)).filter(Boolean);
                this.animations = LS.get(KEYS.ANIM, true);
                this.debug = !!LS.get(KEYS.DEBUG, false);
                if (!this.data.length) this.addAsg('任务 1');
                this.rebuildAsgIndex();
                this.curId = this.data[this.data.length - 1].id;
                this.applyAnim();
                window.addEventListener('beforeunload', () => this.flushPersist());
                UI.init();
            },
            rebuildAsgIndex() {
                this.asgMap = new Map(this.data.map(a => [a.id, a]));
            },
            normalizeAsg(asg) {
                if (!asg || typeof asg !== 'object') return null;
                const name = String(asg.name || '').trim();
                const legacyEnglish = /英语/.test(name);
                const subject = String(asg.subject || '').trim() || (legacyEnglish ? '英语' : '其他');
                return {
                    id: Number(asg.id),
                    name: name || '未命名任务',
                    subject,
                    records: asg.records && typeof asg.records === 'object' ? asg.records : {}
                };
            },
            normalizeAsgInPlace(asg) {
                const normalized = this.normalizeAsg(asg);
                if (!normalized) return null;
                if (asg && typeof asg === 'object') {
                    asg.id = normalized.id;
                    asg.name = normalized.name;
                    asg.subject = normalized.subject;
                    asg.records = normalized.records;
                    return asg;
                }
                return normalized;
            },
            invalidateDerived() {
                this._metricsToken++;
                this._statsCache.clear();
            },
            queuePersist() {
                clearTimeout(this._persistTimer);
                this._persistTimer = setTimeout(() => this.flushPersist(), 300);
            },
            flushPersist() {
                clearTimeout(this._persistTimer);
                this._persistTimer = 0;
                if (this._dirtyData) {
                    LS.set(KEYS.DATA, this.data);
                    this._dirtyData = false;
                }
                if (this._dirtyList) {
                    LS.set(KEYS.LIST, this.list);
                    this._dirtyList = false;
                }
            },
            parseRoster() {
                this.roster = this.list.map(l => {
                    const noEnglish = /\s*#(?:非英语|非英|no-en|noeng|not-en)\s*$/i.test(l);
                    const line = l.replace(/\s*#(?:非英语|非英|no-en|noeng|not-en)\s*$/i, '').trim();
                    const i = line.indexOf(' ');
                    return i === -1 ? { id: line, name: '', noEnglish } : { id: line.slice(0, i), name: line.slice(i + 1), noEnglish };
                }).filter(s => s.id);
                this.rosterIndexMap = new Map(this.roster.map((stu, index) => [stu.id, index]));
                this.noEnglishIds = this.roster.filter(stu => stu.noEnglish).map(stu => stu.id);
                this._rosterVersion++;
                this.invalidateDerived();
            },
            save({ render = true, immediate = false, dirtyData = true, dirtyList = false, asgListChanged = false, normalizeMode = 'all', targetAsgId = null } = {}) {
                if (normalizeMode === 'all') {
                    this.data = this.data.map(a => this.normalizeAsg(a)).filter(Boolean);
                    this.rebuildAsgIndex();
                } else if (normalizeMode === 'target' && targetAsgId != null) {
                    const asg = this.asgMap.get(targetAsgId) || this.data.find(item => item.id === targetAsgId);
                    if (asg) this.normalizeAsgInPlace(asg);
                } else if (normalizeMode === 'none') {
                    if (!this.asgMap.size || this.asgMap.size !== this.data.length) this.rebuildAsgIndex();
                }
                this.invalidateDerived();
                if (dirtyData) this._dirtyData = true;
                if (dirtyList) this._dirtyList = true;
                if (asgListChanged) this._asgListVersion++;
                if (immediate) this.flushPersist();
                else this.queuePersist();
                if (render) UI.render();
            },
            saveAnim() { LS.set(KEYS.ANIM, this.animations); this.applyAnim(); },
            applyAnim() {
                document.body.classList.toggle('no-animations', !this.animations);
                $('btnAnim').textContent = `显示动画: ${this.animations ? '开' : '关'}`;
                $('btnDebug').textContent = `调试面板: ${Debug.enabled ? '开' : '关'}`;
            },
            applyScoring() {
                $('btnScoreMenu').textContent = `打分模式: ${this.scoring ? '开' : '关'}`;
            },
            get cur() { return this.asgMap.get(this.curId) || this.data[0]; },
            addAsg(n) {
                let id = Date.now();
                while (this.asgMap.has(id)) id++;
                const asg = this.normalizeAsg({ id, name: (n || '').trim() || '未命名任务', subject: '英语', records: {} });
                this.data.push(asg);
                this.rebuildAsgIndex();
                this.curId = id;
                this.save({ asgListChanged: true, normalizeMode: 'none' });
            },
            selectAsg(id) {
                if (!this.asgMap.has(id)) return;
                this.curId = id;
                UI.render();
            },
            renameAsg(id, name) {
                const asg = this.asgMap.get(id);
                const safeName = (name || '').trim();
                if (!asg || !safeName) return false;
                asg.name = safeName;
                this.save({ asgListChanged: true, normalizeMode: 'target', targetAsgId: id });
                return true;
            },
            updateAsgMeta(id, payload = {}) {
                const asg = this.asgMap.get(id);
                if (!asg) return false;
                const safeName = String(payload.name ?? asg.name).trim();
                const safeSubject = String(payload.subject ?? asg.subject ?? '').trim() || '英语';
                if (!safeName) return false;
                asg.name = safeName;
                asg.subject = safeSubject;
                this.save({ asgListChanged: true, normalizeMode: 'target', targetAsgId: id });
                return true;
            },
            removeAsg(id) {
                if (this.data.length <= 1) return false;
                const idx = this.data.findIndex(a => a.id === id);
                if (idx === -1) return false;
                this.data.splice(idx, 1);
                if (this.curId === id) {
                    const fallback = this.data[Math.max(0, idx - 1)] || this.data[0];
                    this.curId = fallback.id;
                }
                this.rebuildAsgIndex();
                this.save({ asgListChanged: true, normalizeMode: 'none' });
                return true;
            },
            getAsgSubject(asg) {
                return String(asg?.subject || '').trim() || (/英语/.test(asg?.name || '') ? '英语' : '其他');
            },
            isEnglishAsg(asg) { return this.getAsgSubject(asg) === '英语'; },
            isStuIncluded(asg, stu) { return !(this.isEnglishAsg(asg) && stu.noEnglish); },
            getAsgMetrics(asg) {
                if (!asg) return { total: 0, done: 0 };
                const cached = this._statsCache.get(asg.id);
                if (cached && cached.token === this._metricsToken) return cached.metrics;
                let total = 0;
                let done = 0;
                for (const stu of this.roster) {
                    if (!this.isStuIncluded(asg, stu)) continue;
                    total++;
                    if (asg.records?.[stu.id]?.done) done++;
                }
                const metrics = { total, done };
                this._statsCache.set(asg.id, { token: this._metricsToken, metrics });
                return metrics;
            },
            getAsgTotalCount(asg) { return this.getAsgMetrics(asg).total; },
            getAsgDoneCount(asg) { return this.getAsgMetrics(asg).done; },
            getAsgRowSnapshot(asg) {
                if (!asg) return { included: [], done: [] };
                const cacheKey = `rows:${asg.id}`;
                const cached = this._statsCache.get(cacheKey);
                if (cached && cached.token === this._metricsToken) return cached.value;
                const included = new Array(this.roster.length);
                const done = new Array(this.roster.length);
                for (let i = 0; i < this.roster.length; i++) {
                    const stu = this.roster[i];
                    const isIncluded = this.isStuIncluded(asg, stu);
                    included[i] = isIncluded;
                    done[i] = isIncluded && !!asg.records?.[stu.id]?.done;
                }
                const value = { included, done };
                this._statsCache.set(cacheKey, { token: this._metricsToken, value });
                return value;
            },
            getStatsRows(selectedIds) {
                const keyIds = selectedIds.slice().sort((a, b) => a - b);
                const cacheKey = `${this._metricsToken}|${keyIds.join(',')}`;
                const cached = this._statsCache.get(cacheKey);
                if (cached) return cached;
                const tgs = keyIds.map(id => this.asgMap.get(id)).filter(Boolean);
                const snapshots = tgs.map(asg => this.getAsgRowSnapshot(asg));
                const rows = this.roster.map((s, i) => {
                    let total = 0;
                    let doneCount = 0;
                    const dones = [];
                    for (const snapshot of snapshots) {
                        if (!snapshot.included[i]) continue;
                        total++;
                        const done = snapshot.done[i];
                        dones.push(done);
                        if (done) doneCount++;
                    }
                    const rate = total ? Math.round(doneCount / total * 100) : 0;
                    return { ...s, dones, rate, total, i };
                }).filter(r => r.total > 0).sort((a, b) => b.rate - a.rate || a.i - b.i);
                const avgRate = rows.length ? Math.round(rows.reduce((sum, row) => sum + row.rate, 0) / rows.length) : 0;
                const result = { tgs, rows, avgRate };
                this._statsCache.set(cacheKey, result);
                return result;
            },
            updRec(id, val) {
                const asg = this.cur;
                if (!asg) return;
                const prev = asg.records[id] || {};
                const r = this.cur.records;
                r[id] = { ...r[id], ...val };
                const next = r[id];
                if (!next.done && (next.score == null || next.score === '')) delete r[id];
                this.invalidateDerived();
                this._dirtyData = true;
                this.queuePersist();
                UI.renderStudent(id);
                const prevDone = !!prev.done;
                const nextDone = !!(r[id]?.done);
                if (prevDone !== nextDone) UI.renderProgress(this.getAsgDoneCount(asg), this.getAsgTotalCount(asg));
            }
        };
        const UI = {
            _gridFrozen: false,
            _taskSelectVersion: -1,
            _lastRenderAsgId: null,
            _lastRosterVersion: -1,
            _lastGridMetricsKey: '',
            _gridPaddingX: 0,
            _gridPaddingY: 0,
            init() {
                BackHandler.init();
                this.gridEl = $('grid');
                this.counterEl = $('counter');
                this.progressFillEl = $('progressFill');
                this.asgSelectEl = $('asgSelect');
                this.asgSelectEl.onchange = e => { State.curId = +e.target.value; this.render(); };
                $('btnView').onclick = e => { document.body.classList.toggle('mode-names', (State.mode = State.mode === 'id' ? 'name' : 'id') === 'name'); e.target.classList.toggle('active', State.mode === 'name'); };
                $('btnMenu').onclick = e => { e.stopPropagation(); $('menu').classList.toggle('show'); };
                document.onclick = () => $('menu').classList.remove('show');
                $('menu').onclick = e => {
                    const act = e.target.getAttribute('act');
                    if (!act || !Actions[act]) return;
                    $('menu').classList.remove('show');
                    Actions[act]();
                };
                $('fileIn').onchange = Actions.handleFile;
                Debug.init();
                this.setupGrid();
                this.setupGridSizing();
                State.applyScoring();
                this.render();
            },
            setupGrid() {
                let timer = null, pressCard = null, longPressed = false, moved = false, startPos = { x: 0, y: 0 };
                const grid = this.gridEl;
                const isTrackedCard = card => card && (card.dataset.id === '38' || card.dataset.id === '39' || card.dataset.id === '40');
                const cancelTimer = () => {
                    if (!timer) return;
                    clearTimeout(timer);
                    timer = null;
                };
                const handle = (card, long) => {
                    if (card.dataset.excluded === '1') return;
                    const { id, name } = card.dataset;
                    if (Debug.enabled) Debug.log(`卡片触发 id=${id} name=${name} long=${long ? 1 : 0} scoring=${State.scoring ? 1 : 0}`);
                    if (long || State.scoring) Actions.score(id, name);
                    else State.updRec(id, { done: !State.cur.records[id]?.done });
                };
                const resetState = () => {
                    if (pressCard) pressCard.classList.remove('pressing');
                    cancelTimer();
                    pressCard = null;
                    longPressed = false;
                    moved = false;
                    startPos = { x: 0, y: 0 };
                };
                grid.onpointerdown = e => {
                    const tc = e.target.closest('.student-card');
                    if (Debug.enabled && isTrackedCard(tc)) Debug.log(`pointerdown id=${tc.dataset.id} x=${Math.round(e.clientX)} y=${Math.round(e.clientY)}`);
                    const c = e.target.closest('.student-card');
                    if (!c) return;
                    pressCard = c;
                    longPressed = false;
                    moved = false;
                    startPos = { x: e.clientX, y: e.clientY };
                    c.classList.add('pressing');
                    cancelTimer();
                    timer = setTimeout(() => {
                        timer = null;
                        longPressed = true;
                        c.classList.remove('pressing');
                        handle(c, true);
                        resetState();
                    }, 500);
                };
                grid.onpointerup = e => {
                    const tc = e.target.closest('.student-card');
                    if (Debug.enabled && isTrackedCard(tc)) Debug.log(`pointerup id=${tc.dataset.id} moved=${moved ? 1 : 0} long=${longPressed ? 1 : 0}`);
                    const c = e.target.closest('.student-card');
                    if (c && pressCard === c && !longPressed && !moved) {
                        c.classList.remove('pressing');
                        handle(c, false);
                    }
                    resetState();
                };
                grid.onpointermove = e => {
                    if (!pressCard) return;
                    const dx = Math.abs(e.clientX - startPos.x);
                    const dy = Math.abs(e.clientY - startPos.y);
                    if (dx > 10 || dy > 8) {
                        moved = true;
                        pressCard.classList.remove('pressing');
                        cancelTimer();
                    }
                };
                grid.onpointercancel = resetState;
                grid.onpointerleave = () => {
                    if (pressCard) pressCard.classList.remove('pressing');
                    cancelTimer();
                    pressCard = null;
                };
            },
            setupGridSizing() {
                const grid = this.gridEl;
                this.refreshGridPadding();
                const refresh = () => {
                    this.refreshGridPadding();
                    this.scheduleGridLayout();
                };
                this._gridResizeObserver = new ResizeObserver(refresh);
                this._gridResizeObserver.observe(grid);
                window.addEventListener('resize', refresh, { passive: true });
                if (window.visualViewport) window.visualViewport.addEventListener('resize', refresh, { passive: true });
                this.scheduleGridLayout();
            },
            refreshGridPadding() {
                const style = getComputedStyle(this.gridEl);
                this._gridPaddingX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
                this._gridPaddingY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
            },
            setGridFrozen(frozen) {
                this._gridFrozen = !!frozen;
                if (!this._gridFrozen) this.scheduleGridLayout();
            },
            scheduleGridLayout() {
                if (this._gridFrozen) return;
                cancelAnimationFrame(this._gridLayoutRaf || 0);
                this._gridLayoutRaf = requestAnimationFrame(() => this.updateGridMetrics());
            },
            calcGridLayout(count, width, height) {
                const safeCount = Math.max(1, count || 1);
                const cols = 5;
                const rows = Math.ceil(safeCount / cols);
                const baseGap = Math.max(4, Math.min(10, Math.round(Math.min(width, height) / 95)));
                const calcSize = gap => ({
                    cellW: (width - gap * (cols - 1)) / cols,
                    cellH: (height - gap * (rows - 1)) / rows
                });
                let gap = baseGap;
                let size = calcSize(gap);
                let base = Math.min(size.cellW, size.cellH);
                if (base < 24) {
                    gap = 2;
                    size = calcSize(gap);
                    base = Math.min(size.cellW, size.cellH);
                }
                base = Math.max(18, base);

                return {
                    cols,
                    rows,
                    gap,
                    cellW: Math.max(18, size.cellW),
                    cellH: Math.max(18, size.cellH),
                    idSize: Math.max(12, Math.min(44, Math.round(base * 0.34))),
                    idCornerSize: Math.max(9, Math.min(16, Math.round(base * 0.2))),
                    nameSize: Math.max(9, Math.min(20, Math.round(base * 0.18))),
                    tagSize: Math.max(8, Math.min(13, Math.round(base * 0.12))),
                    cardPad: Math.max(3, Math.min(8, Math.round(base * 0.08))),
                    cardRadius: Math.max(8, Math.min(16, Math.round(base * 0.15)))
                };
            },
            updateGridMetrics() {
                const grid = this.gridEl;
                const count = Math.max(1, State.roster.length || 1);
                const width = Math.max(0, grid.clientWidth - this._gridPaddingX);
                const height = Math.max(0, grid.clientHeight - this._gridPaddingY);
                if (!width || !height) return;

                const metrics = this.calcGridLayout(count, width, height);
                const metricsKey = `${count}|${metrics.cols}|${metrics.rows}|${metrics.gap}|${metrics.cellW.toFixed(2)}|${metrics.cellH.toFixed(2)}|${metrics.idSize}|${metrics.nameSize}|${metrics.tagSize}|${metrics.cardPad}|${metrics.cardRadius}`;
                if (metricsKey === this._lastGridMetricsKey) return;
                this._lastGridMetricsKey = metricsKey;
                grid.style.setProperty('--grid-cols', metrics.cols);
                grid.style.setProperty('--grid-rows', metrics.rows);
                grid.style.setProperty('--grid-gap', `${metrics.gap}px`);
                grid.style.setProperty('--cell-w', `${metrics.cellW}px`);
                grid.style.setProperty('--cell-h', `${metrics.cellH}px`);
                grid.style.setProperty('--id-size', `${metrics.idSize}px`);
                grid.style.setProperty('--id-corner-size', `${metrics.idCornerSize}px`);
                grid.style.setProperty('--name-size', `${metrics.nameSize}px`);
                grid.style.setProperty('--tag-size', `${metrics.tagSize}px`);
                grid.style.setProperty('--card-pad', `${metrics.cardPad}px`);
                grid.style.setProperty('--card-radius', `${metrics.cardRadius}px`);
            },
            createCard() {
                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'student-card';
                card.innerHTML = `<span class="card-id"></span><span class="card-name"></span><span class="card-score" hidden></span>`;
                return card;
            },
            syncCardPool() {
                const grid = this.gridEl;
                const target = State.roster.length;
                while (grid.children.length < target) grid.appendChild(this.createCard());
                while (grid.children.length > target) grid.lastElementChild.remove();
            },
            renderCard(card, stu, rec, excluded = false) {
                if (card.dataset.id !== stu.id) card.dataset.id = stu.id;
                if (card.dataset.name !== stu.name) card.dataset.name = stu.name;
                card.dataset.excluded = excluded ? '1' : '0';

                const idEl = card.children[0];
                const nameEl = card.children[1];
                const scoreEl = card.children[2];

                if (idEl.textContent !== stu.id) idEl.textContent = stu.id;
                if (nameEl.textContent !== stu.name) nameEl.textContent = stu.name;

                const done = !excluded && !!rec.done;
                card.classList.toggle('done', done);
                card.classList.toggle('excluded', excluded);

                if (!excluded && rec.score != null && rec.score !== '') {
                    if (scoreEl.hidden) scoreEl.hidden = false;
                    const scoreText = String(rec.score);
                    if (scoreEl.textContent !== scoreText) scoreEl.textContent = scoreText;
                } else if (!scoreEl.hidden) {
                    scoreEl.hidden = true;
                    scoreEl.textContent = '';
                }
            },
            renderStudent(id) {
                const asg = State.cur;
                const index = State.rosterIndexMap.get(id);
                if (!asg || index == null) return;
                this.syncCardPool();
                const card = this.gridEl.children[index];
                const stu = State.roster[index];
                if (!card || !stu) return;
                const rec = asg.records[id] || {};
                const excluded = !State.isStuIncluded(asg, stu);
                this.renderCard(card, stu, rec, excluded);
            },
            renderProgress(doneCount, total = State.roster.length) {
                this.counterEl.textContent = `${doneCount}/${total}`;
                this.progressFillEl.style.width = total ? `${(doneCount / total) * 100}%` : '0%';
            },
            ensureTaskOptions() {
                const sel = this.asgSelectEl;
                if (this._taskSelectVersion !== State._asgListVersion) {
                    const optionsHtml = State.data.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
                    sel.innerHTML = optionsHtml;
                    this._taskSelectVersion = State._asgListVersion;
                }
                if (sel.value != State.curId) sel.value = String(State.curId);
            },
            getCardState(asg, stu) {
                const excluded = !State.isStuIncluded(asg, stu);
                const rec = asg?.records?.[stu.id] || {};
                return {
                    excluded,
                    done: !excluded && !!rec.done,
                    score: !excluded && rec.score != null && rec.score !== '' ? String(rec.score) : ''
                };
            },
            shouldRefreshCard(prevAsg, nextAsg, stu) {
                if (!prevAsg || !nextAsg) return true;
                const prevState = this.getCardState(prevAsg, stu);
                const nextState = this.getCardState(nextAsg, stu);
                return prevState.excluded !== nextState.excluded || prevState.done !== nextState.done || prevState.score !== nextState.score;
            },
            getChangedStudentIds(prevAsg, nextAsg) {
                if (!prevAsg || !nextAsg) return State.roster.map(stu => stu.id);
                const changed = new Set([
                    ...Object.keys(prevAsg.records || {}),
                    ...Object.keys(nextAsg.records || {})
                ]);
                if (State.isEnglishAsg(prevAsg) !== State.isEnglishAsg(nextAsg)) {
                    State.noEnglishIds.forEach(id => changed.add(id));
                }
                return changed;
            },
            render() {
                const asg = State.cur; if (!asg) return;
                const prevAsg = State.asgMap.get(this._lastRenderAsgId);
                const forceFull = this._lastRosterVersion !== State._rosterVersion || !prevAsg || prevAsg.id === asg.id;
                this.ensureTaskOptions();

                this.syncCardPool();
                const cards = this.gridEl.children;

                const total = State.getAsgTotalCount(asg);
                const doneCount = State.getAsgDoneCount(asg);
                if (forceFull) {
                    State.roster.forEach((stu, i) => {
                        const rec = asg.records[stu.id] || {};
                        const excluded = !State.isStuIncluded(asg, stu);
                        this.renderCard(cards[i], stu, rec, excluded);
                    });
                } else {
                    this.getChangedStudentIds(prevAsg, asg).forEach(id => {
                        const index = State.rosterIndexMap.get(id);
                        if (index == null) return;
                        const stu = State.roster[index];
                        if (!stu) return;
                        if (!this.shouldRefreshCard(prevAsg, asg, stu)) return;
                        const rec = asg.records[stu.id] || {};
                        const excluded = !State.isStuIncluded(asg, stu);
                        this.renderCard(cards[index], stu, rec, excluded);
                    });
                }
                this.renderProgress(doneCount, total);
                this._lastRenderAsgId = asg.id;
                this._lastRosterVersion = State._rosterVersion;
                this.scheduleGridLayout();
            }
        };

        const Modal = {
            el: $('modal'),
            card: $('modal').querySelector('.modal-card'),
            title: $('modal').querySelector('.modal-title'),
            body: $('modal').querySelector('.modal-body'),
            footer: $('modal').querySelector('.modal-footer'),
            closeBtn: $('modal').querySelector('.modal-close'),
            header: $('modal').querySelector('.modal-header'),
            isOpen: false,
            isClosing: false,
            isFull: false,
            resolve: null,
            _scrollY: 0,
            _layoutRaf: 0,
            _viewportHandler: null,
            _focusHandler: null,
            _focusTimer: 0,
            _pointerGuardTimer: 0,
            _stableFocusMode: false,
            _lastLayout: null,

            init() {
                this.closeBtn.onclick = () => {
                    if (Debug.enabled) Debug.log('点击关闭按钮');
                    this.close(false);
                };
                document.addEventListener('keydown', (e) => {
                    if (e.key !== 'Escape') return;
                    if (this.isOpen) this.close(false);
                    else BackHandler.closeOverlayLikeEsc();
                });
            },

            lockBody() {
                this._scrollY = window.scrollY || 0;
                document.body.style.setProperty('--locked-body-height', `${window.innerHeight}px`);
                document.body.classList.add('modal-open');
                document.body.style.top = `-${this._scrollY}px`;
            },

            unlockBody() {
                document.body.classList.remove('modal-open');
                document.body.style.top = '';
                document.body.style.removeProperty('--locked-body-height');
                window.scrollTo(0, this._scrollY || 0);
            },

            releaseActiveInput() {
                const active = document.activeElement;
                if (!active || active === document.body) return;
                if (active.matches?.('input, textarea, select, [contenteditable="true"]')) active.blur();
            },

            shouldUseStableFocusMode(el) {
                if (!IS_ANDROID_FIREFOX || !el) return false;
                return el.matches?.('input, textarea, [contenteditable="true"]');
            },

            shouldFreezeViewportOffsets() {
                return this._stableFocusMode;
            },

            scheduleFocus(el) {
                clearTimeout(this._focusTimer);
                this._focusTimer = 0;
                if (!el) return;
                const delay = this.shouldUseStableFocusMode(el) ? 180 : 60;
                this._focusTimer = setTimeout(() => {
                    this._focusTimer = 0;
                    if (!this.isOpen) return;
                    el.focus({ preventScroll: true });
                }, delay);
            },

            clearFocusTimer() {
                clearTimeout(this._focusTimer);
                this._focusTimer = 0;
            },

            armPointerGuard(ms = 320) {
                clearTimeout(this._pointerGuardTimer);
                this._pointerGuardTimer = 0;
                this.el.style.pointerEvents = 'none';
                this._pointerGuardTimer = setTimeout(() => {
                    this._pointerGuardTimer = 0;
                    if (!this.isOpen || this.isClosing) return;
                    this.el.style.pointerEvents = '';
                }, ms);
            },

            clearPointerGuard() {
                clearTimeout(this._pointerGuardTimer);
                this._pointerGuardTimer = 0;
                this.el.style.pointerEvents = '';
            },

            buildPagePanel(title, content, btns = []) {
                const panel = document.createElement('div');
                panel.className = 'st-layout';
                panel.style.cssText = 'display:flex;flex-direction:column;height:100%';

                const nav = document.createElement('div');
                nav.className = 'st-nav';
                const titleEl = document.createElement('h2');
                titleEl.className = 'st-title';
                titleEl.textContent = title || '';
                const closeBtn = document.createElement('button');
                closeBtn.className = 'st-close';
                closeBtn.type = 'button';
                closeBtn.innerHTML = '&times;';
                closeBtn.onclick = () => this.close(false);
                nav.appendChild(titleEl);
                nav.appendChild(closeBtn);

                const scroll = document.createElement('div');
                scroll.className = 'st-scroll-area';

                const section = document.createElement('section');
                section.className = 'modal-page-section';
                if (typeof content === 'string') {
                    const text = document.createElement('div');
                    text.className = 'modal-page-text';
                    text.textContent = content;
                    section.appendChild(text);
                } else {
                    section.appendChild(content);
                }

                if (btns.length) {
                    const actions = document.createElement('div');
                    actions.className = 'modal-page-actions';
                    btns.forEach(b => {
                        const btn = document.createElement('button');
                        btn.className = `btn ${b.type || 'btn-c'}`;
                        btn.type = 'button';
                        btn.textContent = b.text;
                        btn.onclick = () => { if (b.onClick) b.onClick(); else this.close(b.val); };
                        actions.appendChild(btn);
                    });
                    section.appendChild(actions);
                }

                scroll.appendChild(section);
                panel.appendChild(nav);
                panel.appendChild(scroll);
                return panel;
            },

            bindViewport() {
                this.unbindViewport();
                this._viewportHandler = () => this.scheduleLayout();
                this._focusHandler = () => {
                    if (this.shouldFreezeViewportOffsets()) return;
                    this.scheduleLayout();
                };
                window.addEventListener('resize', this._viewportHandler, { passive: true });
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', this._viewportHandler, { passive: true });
                }
                if (!this.shouldFreezeViewportOffsets()) {
                    document.addEventListener('focusin', this._focusHandler);
                }
            },

            unbindViewport() {
                if (this._viewportHandler) {
                    window.removeEventListener('resize', this._viewportHandler);
                    if (window.visualViewport) {
                        window.visualViewport.removeEventListener('resize', this._viewportHandler);
                    }
                    this._viewportHandler = null;
                }
                if (this._focusHandler) {
                    document.removeEventListener('focusin', this._focusHandler);
                    this._focusHandler = null;
                }
                cancelAnimationFrame(this._layoutRaf || 0);
                this._layoutRaf = 0;
                this.clearFocusTimer();
            },

            scheduleLayout() {
                if (!this.isOpen) return;
                cancelAnimationFrame(this._layoutRaf || 0);
                this._layoutRaf = requestAnimationFrame(() => this.updateLayout());
            },

            updateLayout() {
                if (!this.isOpen) return;
                const vv = window.visualViewport;
                const vpH = Math.round(vv ? vv.height : window.innerHeight);
                let topGap;
                let bottomGap;

                if (this.shouldFreezeViewportOffsets()) {
                    topGap = this.isFull ? 0 : 12;
                    bottomGap = this.isFull ? 0 : 12;
                } else {
                    const vpTop = Math.round(vv ? vv.offsetTop : 0);
                    const keyboardInset = Math.max(0, Math.round(window.innerHeight - (vv ? vv.height + vv.offsetTop : window.innerHeight)));
                    topGap = this.isFull ? vpTop : Math.max(10, vpTop + 12);
                    bottomGap = this.isFull ? keyboardInset : Math.max(10, keyboardInset + 12);
                }

                const nextLayout = { vpH, topGap, bottomGap };
                const prev = this._lastLayout;
                if (prev && prev.vpH === vpH && prev.topGap === topGap && prev.bottomGap === bottomGap) return;
                this._lastLayout = nextLayout;
                this.el.style.setProperty('--modal-vh', `${vpH}px`);
                this.el.style.setProperty('--modal-top-gap', `${topGap}px`);
                this.el.style.setProperty('--modal-bottom-gap', `${bottomGap}px`);
            },

            show({ title, content, type = 'normal', btns = [], autoFocusEl = null }) {
                if (this.isOpen) this.forceClose(false);
                UI.setGridFrozen(true);
                this.releaseActiveInput();
                const usePageLayout = type !== 'full';
                this.title.textContent = title || '';
                this.body.innerHTML = '';
                if (!usePageLayout) {
                    if (typeof content === 'string') this.body.innerHTML = content;
                    else this.body.appendChild(content);
                } else {
                    this.body.appendChild(this.buildPagePanel(title, content, btns));
                }

                this.el.className = ''; // Reset class
                this.isFull = true;
                this._stableFocusMode = this.shouldUseStableFocusMode(autoFocusEl);
                this.el.classList.add('full');
                if (this._stableFocusMode) this.el.classList.add('focus-stable');
                this.header.style.display = 'none';

                this.footer.innerHTML = '';
                this.footer.style.display = !usePageLayout && btns.length ? 'flex' : 'none';

                if (!usePageLayout) {
                    btns.forEach(b => {
                        const btn = document.createElement('button');
                        btn.className = `btn ${b.type || 'btn-c'}`;
                        btn.textContent = b.text;
                        btn.onclick = () => { if (b.onClick) b.onClick(); else this.close(b.val); };
                        this.footer.appendChild(btn);
                    });
                }

                this.isOpen = true;
                if (Debug.enabled) Debug.log(`Modal.show open type=${type} stable=${this._stableFocusMode ? 1 : 0}`);
                this.isClosing = false;
                this._lastLayout = null;
                this.el.classList.add('is-open');
                this.armPointerGuard();
                this.lockBody();
                this.bindViewport();
                this.scheduleLayout();
                this.scheduleFocus(autoFocusEl);
                return new Promise(r => this.resolve = r);
            },

            close(val) {
                if (!this.isOpen || this.isClosing) return;
                if (Debug.enabled) Debug.log(`Modal.close val=${val}`);
                this.isClosing = true;
                this.el.classList.add('is-closing');
                this.el.classList.remove('is-open');

                const cleanup = () => {
                    this.el.classList.remove('is-closing');
                    this.el.classList.remove('full', 'focus-stable');
                    this.isOpen = false;
                    this.isClosing = false;
                    this.isFull = false;
                    this._stableFocusMode = false;
                    this._lastLayout = null;
                    this.clearPointerGuard();
                    this.unbindViewport();
                    this.unlockBody();
                    UI.setGridFrozen(false);
                    this.el.style.removeProperty('--modal-vh');
                    this.el.style.removeProperty('--modal-top-gap');
                    this.el.style.removeProperty('--modal-bottom-gap');
                    const resolver = this.resolve;
                    this.resolve = null;
                    if (resolver) resolver(val);
                };

                if (!State.animations) return cleanup();
                setTimeout(cleanup, 220);
            },

            forceClose(val = false) {
                if (!this.isOpen) return;
                if (Debug.enabled) Debug.log(`Modal.forceClose val=${val}`);
                this.el.classList.remove('is-open', 'is-closing', 'full', 'focus-stable');
                this.isOpen = false;
                this.isClosing = false;
                this.isFull = false;
                this._stableFocusMode = false;
                this._lastLayout = null;
                this.clearPointerGuard();
                this.unbindViewport();
                this.unlockBody();
                UI.setGridFrozen(false);
                this.el.style.removeProperty('--modal-vh');
                this.el.style.removeProperty('--modal-top-gap');
                this.el.style.removeProperty('--modal-bottom-gap');
                const resolver = this.resolve;
                this.resolve = null;
                if (resolver) resolver(val);
            },

            alert(msg) { return this.show({ title: '提示', content: msg, btns: [{ text: '确定', type: 'btn-p', val: true }] }); },
            confirm(msg) { return this.show({ title: '确认', content: msg, btns: [{ text: '取消', type: 'btn-c', val: false }, { text: '确定', type: 'btn-p', val: true }] }); },
            prompt(title, val = '', type = 'text') {
                const input = document.createElement('input');
                input.className = 'input-ui';
                input.value = val;
                if (type === 'number') { input.type = 'number'; input.inputMode = 'numeric'; }
                input.enterKeyHint = 'done';
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.isComposing) {
                        e.preventDefault();
                        this.close(input.value);
                    }
                });
                return this.show({
                    title, content: input, autoFocusEl: input,
                    btns: [
                        { text: '取消', type: 'btn-c', val: false },
                        { text: '确定', type: 'btn-p', onClick: () => this.close(input.value) }
                    ]
                });
            }
        };

        const Actions = {
            toggleScore() { State.scoring = !State.scoring; State.applyScoring(); },
            toggleAnim() { State.animations = !State.animations; State.saveAnim(); },
            toggleDebug() { Debug.toggle(); Toast.show(`调试面板已${Debug.enabled ? '开启' : '关闭'}`); },
            buildAsgLayout(title) {
                const c = document.createElement('div');
                c.className = 'st-layout';
                c.style.cssText = 'display:flex;flex-direction:column;height:100%';
                c.innerHTML = `<div class="st-nav"><h2 class="st-title">${title}</h2><button class="st-close" onclick="Modal.close()">&times;</button></div>
                    <div class="st-scroll-area"></div>`;
                return { root: c, body: c.querySelector('.st-scroll-area') };
            },
            async add() {
                const d = new Date(), m = (d.getMonth() + 1 + '').padStart(2, '0'), dd = (d.getDate() + '').padStart(2, '0');
                const def = `${m}${dd}作业`, alt = `${m}${dd}小测`;
                const c = document.createElement('div');
                c.innerHTML = `<input class="input-ui" value="${def}"><div style="display:flex;gap:8px;margin-top:8px">
                    <button class="btn btn-c" style="padding:4px 10px;font-size:0.85rem" data-v="">清空</button>
                    <button class="btn btn-c" style="padding:4px 10px;font-size:0.85rem" data-v="${alt}">${alt}</button></div>
                    <div style="font-size:12px;color:#6c757d;margin-top:10px">默认科目标签为英语，会自动排除名单中标记了 #非英语 的学生。</div>`;
                const inp = c.firstChild;
                c.onclick = e => { const v = e.target.dataset.v; if (v != null) { inp.value = v; inp.focus(); } };
                const n = await Modal.show({ title: '新建任务', content: c, autoFocusEl: inp, btns: [{ text: '取消', val: false }, { text: '确定', type: 'btn-p', onClick: () => Modal.close(inp.value) }] });
                if (n) State.addAsg(n);
            },
            async del() {
                if (State.data.length <= 1) return Modal.alert('至少保留一个任务');
                if (await Modal.confirm('删除此任务？')) State.removeAsg(State.curId);
            },
            async score(id, name) {
                const asg = State.cur;
                const students = State.roster.filter(stu => State.isStuIncluded(asg, stu));
                let index = students.findIndex(stu => stu.id === id);
                if (index === -1) return;

                const presets = ['0', '100'];
                const { root, body } = this.buildAsgLayout('登记分数');
                const page = document.createElement('div');
                page.className = 'score-layout';
                body.appendChild(page);
                let focusTarget = null;

                const saveStudent = (stuId, scoreValue, forceDone = null) => {
                    const current = asg.records[stuId] || {};
                    const normalized = String(scoreValue ?? '').trim();

                const getCurrentStudent = () => students[index];

                const applyCurrentView = ({ keepFocus = false } = {}) => {
                    const stu = getCurrentStudent();

                    heroTitle.textContent = `${stu.id} ${stu.name || name || ''}`;

                    input = edit.querySelector('.score-input');
                    doneToggleBtn = edit.querySelector('[data-act="toggle-done"]');

                    const stepValue = delta => {
                        const currentValue = Number(input.value || getCurrentRecord().score || 0);
                        if (!Number.isFinite(currentValue)) return;

                    edit.querySelector('[data-act="minus"]').onclick = () => stepValue(-1);
                    edit.querySelector('[data-act="plus"]').onclick = () => stepValue(1);
                    doneToggleBtn.onclick = () => {

                    edit.querySelector('[data-act="clear"]').onclick = () => {
