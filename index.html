<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content">
    <title>作业登记</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="select-wrapper"><select id="asgSelect"></select></div>
        <div class="toolbar">
            <div id="counter" class="badge">0/0</div>
            <button id="btnView" class="btn-icon">姓名</button>
            <div style="position: relative;">
                <button id="btnMenu" class="btn-icon" style="display:flex;padding:6px 4px" title="选项">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <circle cx="12" cy="5" r="2" />
                        <circle cx="12" cy="12" r="2" />
                        <circle cx="12" cy="19" r="2" />
                    </svg>
                </button>
                <div id="menu" class="dropdown">
                    <button class="menu-item" act="toggleScore" id="btnScoreMenu">打分模式: 关</button>
                    <button class="menu-item" act="cardColor">卡片颜色</button>
                    <button class="menu-item" act="add">新建任务</button>
                    <button class="menu-item" act="stats">统计数据</button>
                    <button class="menu-item" act="asgManage">作业项目管理</button>
                    <button class="menu-item" act="roster">编辑学生名单</button>
                    <div class="divider"></div>
                    <button class="menu-item" act="toggleAnim" id="btnAnim">显示动画: 开</button>
                    <button class="menu-item" act="toggleDebug" id="btnDebug">调试面板: 关</button>
                    <button class="menu-item" act="exp">导出备份</button>
                    <button class="menu-item" act="imp">导入备份</button>
                    <button class="menu-item danger" act="del">删除任务</button>
                </div>
            </div>
        </div>
        <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </header>
    <main id="grid"></main>
    <input type="file" id="fileIn" hidden accept=".json">

    <!-- Modals -->
    <!-- Unified Modal -->
    <dialog id="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title"></h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer"></div>
        </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="debugPanel" class="debug-panel" aria-live="polite"></div>

    <script src="core.js"></script>
    <script src="back-handler.js"></script>
    <script src="modal.js"></script>
    <script src="app.js"></script>
</body>

</html>
