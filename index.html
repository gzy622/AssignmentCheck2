<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content">
    <title>作业登记</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="custom-select-wrapper">
            <div class="custom-select" id="customSelect">
                <span class="custom-select-text"></span>
                <svg class="custom-select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
            <div class="custom-select-dropdown" id="customSelectDropdown"></div>
            <select id="asgSelect" hidden></select>
        </div>
        <div class="toolbar">
            <div id="counter" class="badge">0/0</div>
            <button id="btnScore" class="btn-icon">打分</button>
            <div style="position: relative;">
                <button id="btnMenu" class="btn-icon" style="display:flex;padding:6px 4px" title="选项">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <circle cx="12" cy="5" r="2" />
                        <circle cx="12" cy="12" r="2" />
                        <circle cx="12" cy="19" r="2" />
                    </svg>
                </button>
                <div id="menu" class="dropdown">
                    <div class="menu-section">
                        <div class="menu-label">数据与管理</div>
                        <button class="menu-item" act="asgManage">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                            <span>作业管理</span>
                        </button>
                        <button class="menu-item" act="roster">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            <span>学生名单</span>
                        </button>
                        <button class="menu-item" act="quizTrend">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"></polyline><polyline points="14 7 21 7 21 14"></polyline></svg>
                            <span>小测趋势</span>
                        </button>
                    </div>

                    <div class="menu-section">
                        <div class="menu-label">个性化与设置</div>
                        <button class="menu-item" act="toggleView" id="btnView">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><circle cx="8" cy="10" r="2"></circle><path d="M6 16a3 3 0 0 1 4 0"></path><path d="M13 8h5"></path><path d="M13 12h5"></path></svg>
                            <span>显示姓名</span>
                            <small class="menu-status" id="statusView">开</small>
                        </button>
                        <button class="menu-item" act="cardColor">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                            <span>卡片颜色</span>
                        </button>
                        <button class="menu-item" act="toggleAnim" id="btnAnim">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <span>显示动画</span>
                            <small class="menu-status" id="statusAnim">开</small>
                        </button>
                    </div>

                    <div class="menu-section">
                        <div class="menu-label">数据备份</div>
                        <div class="menu-grid">
                            <button class="menu-item grid-item" act="exp">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M10 13l-2 2 2 2"></path><path d="M14 13l2 2-2 2"></path></svg>
                                <span>JSON</span>
                            </button>
                            <button class="menu-item grid-item" act="expExcel">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><rect x="8" y="13" width="8" height="2"></rect><rect x="8" y="17" width="5" height="2"></rect></svg>
                                <span>Excel</span>
                            </button>
                            <button class="menu-item grid-item" act="expText">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="12" y2="17"></line></svg>
                                <span>文本</span>
                            </button>
                            <button class="menu-item grid-item" act="imp">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                <span>导入</span>
                            </button>
                        </div>
                    </div>


                    <div id="menuVersion" class="menu-info">Version: 20260402-02</div>
                </div>
            </div>
        </div>
        <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </header>
    <main id="grid"></main>
    <input type="file" id="fileIn" hidden accept=".json">

    <!-- Modals -->
    <!-- Unified Modal -->
    <dialog id="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title"></h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer"></div>
        </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>


    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="core.js"></script>
    <script src="back-handler.js"></script>
    <script src="modal.js"></script>
    <script src="bottom-sheet.js"></script>
    <script src="scorepad.js"></script>
    <script src="app.js"></script>
    <script src="action-views.js"></script>
    <script src="actions.js"></script>
    <script src="boot.js"></script>
</body>

</html>
